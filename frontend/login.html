<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Kahami Academy</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h1>Kahami Academy</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="#" onclick="navigateTo('index.html')">Inicio</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
                <p class="form-footer">
                    ¿No tienes cuenta? <a href="#" onclick="navigateTo('signup.html')">Regístrate aquí</a>
                </p>
            </form>
            <div id="loginError" class="error-message"></div>
        </div>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="js/utils/navigation.js"></script>
    <script src="js/pages/login.js"></script>
</body>
</html>
