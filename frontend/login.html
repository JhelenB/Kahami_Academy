<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kahami Login</title>
<style>

body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.login-box {
    background: #111;
    padding: 40px;
    border-radius: 20px;
    border: 1px solid gold;
    text-align: center;
}

input {
    display: block;
    width: 250px;
    margin: 10px 0;
    padding: 10px;
    background: #222;
    border: 1px solid gold;
    color: white;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="login-box">
    <h2 style="color:gold;">Kahami Academy</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://127.0.0.1:8000/api/users/login-jwt/", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if(data.access){
        localStorage.setItem("access", data.access);
        localStorage.setItem("userId", data.user_id || '');
        window.location.href = "dashboard.html";
    } else {
        alert("Error login");
    }
}
</script>

</body>
</html>
