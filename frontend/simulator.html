<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahami Simulator Pro</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: white; }
        .header { padding: 15px; background: #111827; text-align: center; font-size: 20px; font-weight: bold; }
        .container { display: grid; grid-template-columns: 250px 1fr; height: 100vh; }
        .sidebar { background: #1f2937; padding: 15px; border-right: 1px solid #334155; }
        .btn { width: 100%; padding: 10px; margin-bottom: 10px; border: none; cursor: pointer; border-radius: 8px; background: #374151; color: white; transition: 0.3s; }
        .btn:hover { background: #4b5563; }
        .btn.active { background: #2563eb; }
        .main { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; }
        canvas { max-width: 90%; max-height: 70vh; border-radius: 15px; border: 2px solid #334155; background: black; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; background: #111827; padding: 15px; border-radius: 12px; display: flex; gap: 15px; align-items: center; border: 1px solid #374151; }
        .action-btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; background: #2563eb; color: white; font-weight: bold; }
        .action-btn:hover { background: #1d4ed8; }
        input[type="file"] { margin-top: 10px; width: 100%; color: #94a3b8; }
    </style>
</head>
<body>

<div class="header">Kahami Academy - Simulador Estético</div>

<div class="container">
    <div class="sidebar">
        <h3>Simulaciones</h3>
        <button class="btn" onclick="selectSimulator('micropigmentation')">Labios</button>
        <button class="btn" onclick="selectSimulator('lashes')">Pestañas</button>
        <button class="btn" onclick="selectSimulator('hairColor')">Cabello</button>
        <button class="btn" onclick="selectSimulator('nails')">Uñas</button>
        <hr style="border: 0.5px solid #374151; margin: 20px 0;">
        <label>Subir Foto:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="main">
        <canvas id="simulationCanvas"></canvas>
        <div class="controls">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#ff0000">
            <label>Intensidad</label>
            <input type="range" id="intensitySlider" min="0" max="100" value="50">
            <button class="action-btn" onclick="runSimulation()">Simular</button>
            <button class="action-btn" style="background:#475569" onclick="saveSimulation()">Guardar</button>
        </div>
    </div>
</div>

<script src="js/pages/simulator.js"></script>
</body>
</html>
