<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kahami Simulator Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    background: #111827;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    background: #1f2937;
    padding: 15px;
}

.btn {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    background: #374151;
    color: white;
}

.btn:hover {
    background: #4b5563;
}

/* MAIN */
.main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* CANVAS */
canvas {
    width: 400px;
    height: 400px;
    border-radius: 15px;
    border: 2px solid #334155;
    background: black;
}

/* CONTROLS */
.controls {
    margin-top: 20px;
    background: #111827;
    padding: 15px;
    border-radius: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
}

input[type="color"],
input[type="range"] {
    cursor: pointer;
}

.action-btn {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2563eb;
    color: white;
}

.action-btn:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<div class="header">
     Kahami Academy - Simulador Estético 
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Simulaciones</h3>

        <button class="btn" onclick="selectSimulator('micropigmentation')"> Labios</button>
        <button class="btn" onclick="selectSimulator('lashes')"> Pestañas</button>
        <button class="btn" onclick="selectSimulator('hairColor')"> Cabello</button>
        <button class="btn" onclick="selectSimulator('nails')">Uñas</button>

        <hr>

        <input type="file" id="imageInput">
    </div>

    <!-- MAIN -->
    <div class="main">

        <canvas id="simulationCanvas"></canvas>

        <div class="controls">
            <label>Color</label>
            <input type="color" id="color" value="#ff0000">

            <label>Intensidad</label>
            <input type="range" id="intensity" min="0" max="100" value="80">

            <button class="action-btn" onclick="runSimulation()">Simular</button>
            <button class="action-btn" onclick="showBefore()">Antes</button>
            <button class="action-btn" onclick="showAfter()">Después</button>
            <button class="action-btn" onclick="saveSimulation()">Guardar</button>
        </div>

    </div>

</div>

<script type="module" src="js/pages/simulator.js"></script>

</body>
</html>
