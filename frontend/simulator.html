<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kahami Simulador</title>

<style>

body {
    margin: 0;
    background: linear-gradient(135deg, #000, #111);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #0a0a0a;
    height: 100vh;
    border-right: 1px solid rgba(255,215,0,0.2);
    padding: 20px;
    overflow-y: auto;
}

.sidebar h2 {
    color: gold;
    margin-top: 0;
}

.menu button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: transparent;
    border: 1px solid gold;
    color: gold;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    background: gold;
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

/* HEADER */
.header {
    font-size: 28px;
    color: gold;
    margin-bottom: 20px;
}

/* INPUT FILE */
input[type="file"] {
    padding: 10px;
    margin-bottom: 20px;
    background: #111;
    color: white;
    border: 1px solid gold;
    border-radius: 10px;
}

/* PANEL */
.panel {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

/* IMAGEN */
.image-box {
    position: relative;
    background: #111;
    padding: 15px;
    border-radius: 20px;
    border: 1px solid rgba(255,215,0,0.3);
}

img {
    max-width: 400px;
    border-radius: 10px;
    display: block;
}

/* LUPA PRO */
.lens {
    position: absolute;
    width: 140px;
    height: 140px;
    border: 2px solid gold;
    border-radius: 50%;
    display: none;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 15px gold;
    pointer-events: none;
}

/* CONTROLES */
.controls {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(255,215,0,0.2);
    width: 250px;
}

.controls h3 {
    color: gold;
    margin-top: 0;
}

/* BOTONES GENERALES */
.btn-pro {
    background: linear-gradient(135deg, #FFD700, #C9A000);
    color: black;
    border: none;
    padding: 14px 22px;
    margin: 10px;
    border-radius: 14px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    position: relative;
    overflow: hidden;
}

/* EFECTO BRILLO ANIMADO */
.btn-pro::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-25deg);
    transition: 0.5s;
}

/* CUANDO PASAS EL MOUSE */
.btn-pro:hover::before {
    left: 130%;
}

/* HOVER GENERAL */
.btn-pro:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.9);
}

/* CLICK */
.btn-pro:active {
    transform: scale(0.95);
}

/* BOTÓN SECUNDARIO (NEGRO CON BORDE DORADO) */
.btn-outline {
    background: transparent;
    color: gold;
    border: 2px solid gold;
}

.btn-outline:hover {
    background: gold;
    color: black;
}

/* BOTÓN GRANDE */
.btn-big {
    font-size: 18px;
    padding: 18px 30px;
    border-radius: 18px;
}

/* EFECTO “PULSO IA” */
.btn-ai {
    animation: glowPulse 2s infinite;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px gold; }
    50% { box-shadow: 0 0 30px gold; }
    100% { box-shadow: 0 0 10px gold; }
}

/* PREVIEW BOX */
.preview-box {
    position: relative;
    overflow: hidden;
}

#previewImage {
    transition: transform 0.3s ease;
}

.preview-box:hover #previewImage {
    transform: scale(1.2);
}

/* OVERLAY */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border: 2px solid gold;
    border-radius: 10px;
    box-shadow: 0 0 20px gold inset;
    pointer-events: none;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>💄 Kahami</h2>

    <div class="menu">
        <button onclick="goDashboard()">📊 Dashboard</button>
        <button style="background: gold; color: black;">🎨 Simulador</button>
        <button onclick="goHistory()">📜 Historial</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">✨ Simulador IA Profesional</div>

<div id="loading" style="display:none;">Analizando rostro...</div>

<input type="file" id="fileInput">

<div class="panel">

    <!-- IMAGEN -->
    <div class="image-box">
        <div class="preview-box">
            <img id="previewImage">
            <div class="overlay"></div>
        </div>
        <div class="lens" id="lens"></div>
    </div>

    <!-- CONTROLES -->
    <div class="controls">
        <h3>Opciones</h3>

        <button class="btn-pro" onclick="applyLips()">💄 Labios</button>
        <button class="btn-pro" onclick="applyEyes()">👁️ Ojos</button>
        <button class="btn-pro" onclick="applySkin()">✨ Piel</button>

        <button class="btn-pro btn-ai" onclick="sendToAI('red')">💄 Rojo</button>
        <button class="btn-pro btn-ai" onclick="sendToAI('pink')">💄 Rosa</button>
        <button class="btn-pro btn-ai" onclick="sendToAI('nude')">💄 Nude</button>

        <button class="btn-outline" onclick="reset()">♻️ Reset</button>
    </div>

</div>

</div>

<script>

/* 🔐 VALIDAR LOGIN */
const token = localStorage.getItem("access");

if (!token) {
    window.location.href = "login.html";
}

let img = document.getElementById("previewImage");
let lens = document.getElementById("lens");

/* CARGAR IMAGEN */
document.getElementById("fileInput").onchange = function(e){
    const reader = new FileReader();
    reader.onload = function(){
        img.src = reader.result;
        analizarIA();
    }
    reader.readAsDataURL(e.target.files[0]);
}

/* 🧠 EFECTO “IA ANALIZANDO” */
function analizarIA() {
    const loading = document.getElementById("loading");

    loading.style.display = "block";

    setTimeout(() => {
        loading.style.display = "none";
        alert("Análisis completado ✨");
    }, 2000);
}

/* LUPA PRO */
img.addEventListener("mousemove", function(e){
    lens.style.display = "block";
    lens.style.left = (e.offsetX - 70) + "px";
    lens.style.top = (e.offsetY - 70) + "px";
});

img.addEventListener("mouseleave", function(){
    lens.style.display = "none";
});

/* EFECTOS */
function applyLips(){
    img.style.filter = "hue-rotate(300deg) contrast(1.2)";
}

function applyEyes(){
    img.style.filter = "brightness(1.3)";
}

function applySkin(){
    img.style.filter = "blur(1px) brightness(1.1)";
}

function reset(){
    img.style.filter = "none";
}

/* 🤖 ENVIAR A IA */
async function sendToAI(color){
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if(!file){
        alert("Por favor sube una imagen primero");
        return;
    }

    let formData = new FormData();
    formData.append("image", file);
    formData.append("color", color);

    try {
        const res = await fetch("http://127.0.0.1:8000/api/simulations/simulate/", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if(data.image){
            document.getElementById("previewImage").src = "data:image/jpeg;base64," + data.image;
            alert("✨ IA procesada correctamente");
        } else {
            alert("Error: " + (data.error || "No response"));
        }
    } catch(error) {
        alert("Error conectando con IA: " + error);
    }
}

/* NAV */
function goDashboard(){
    window.location.href = "dashboard.html";
}

function goHistory(){
    alert("📜 Historial de simulaciones - Próximamente integrado");
}

</script>

</body>
</html>
