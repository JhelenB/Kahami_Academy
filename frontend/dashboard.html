<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kahami Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #111, #000);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,215,0,0.2);
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: gold;
}

.user-box {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logout {
    background: transparent;
    border: 1px solid gold;
    color: gold;
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

.logout:hover {
    background: gold;
    color: black;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px;
}

.hero h1 {
    font-size: 40px;
    color: gold;
}

.hero p {
    margin-top: 10px;
    opacity: 0.7;
}

/* BOTONES GENERALES */
.btn-pro {
    background: linear-gradient(135deg, #FFD700, #C9A000);
    color: black;
    border: none;
    padding: 14px 22px;
    margin: 10px;
    border-radius: 14px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    position: relative;
    overflow: hidden;
}

/* EFECTO BRILLO ANIMADO */
.btn-pro::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-25deg);
    transition: 0.5s;
}

/* CUANDO PASAS EL MOUSE */
.btn-pro:hover::before {
    left: 130%;
}

/* HOVER GENERAL */
.btn-pro:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.9);
}

/* CLICK */
.btn-pro:active {
    transform: scale(0.95);
}

/* BOTÓN SECUNDARIO (NEGRO CON BORDE DORADO) */
.btn-outline {
    background: transparent;
    color: gold;
    border: 2px solid gold;
}

.btn-outline:hover {
    background: gold;
    color: black;
}

/* BOTÓN GRANDE */
.btn-big {
    font-size: 18px;
    padding: 18px 30px;
    border-radius: 18px;
}

/* EFECTO “PULSO IA” */
.btn-ai {
    animation: glowPulse 2s infinite;
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px gold; }
    50% { box-shadow: 0 0 30px gold; }
    100% { box-shadow: 0 0 10px gold; }
}

/* CARDS */
.stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 40px;
}

.card {
    background: #111;
    border: 1px solid rgba(255,215,0,0.2);
    padding: 20px;
    border-radius: 15px;
    width: 180px;
    text-align: center;
}

.card h2 {
    color: gold;
}

/* HISTORIAL */
.history {
    width: 80%;
    margin: auto;
}

.item {
    background: #111;
    border: 1px solid rgba(255,215,0,0.2);
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
    transition: 0.3s;
}

.item:hover {
    transform: translateY(-3px);
    border-color: gold;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">💄 Kahami AI</div>

    <div class="user-box">
        <span id="userName"></span>
        <button class="btn-outline" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Mi Dashboard Beauty AI</h1>
    <p>Descubre tu mejor versión con Inteligencia Artificial ✨</p>

    <div class="actions">
        <button class="btn-pro btn-big" onclick="goSim()">✨ Nueva Simulación</button>
        <button class="btn-outline" onclick="loadHistory()">Ver Historial</button>
    </div>
</div>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h2>2</h2>
        <p>Análisis hoy</p>
    </div>
    <div class="card">
        <h2>94%</h2>
        <p>Simetría</p>
    </div>
    <div class="card">
        <h2>5</h2>
        <p>Looks</p>
    </div>
</div>

<!-- HISTORIAL -->
<div class="history" id="history"></div>

<script>

/* 🔐 VALIDAR LOGIN */
const token = localStorage.getItem("access");

if(!token){
    window.location.href = "login.html";
}

/* 👤 CARGAR USUARIO */
async function loadProfile(){
    const res = await fetch("http://127.0.0.1:8000/api/users/profile/", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    document.getElementById("userName").innerText = data.name;
}

/* 🔥 LOGOUT REAL */
function logout(){
    localStorage.removeItem("access");
    localStorage.removeItem("refresh");
    localStorage.removeItem("userId");
    window.location.href = "login.html";
}

/* 🚀 IR A SIMULADOR */
function goSim(){
    window.location.href = "simulator.html";
}

/* 📊 HISTORIAL */
function loadHistory(){
    const container = document.getElementById("history");

    container.innerHTML = `
        <div class="item">
            <b>Rostro:</b> Ovalado <br>
            <b>Makeup:</b> Natural Glow <br>
            <b>Recomendado:</b> Labios nude
        </div>

        <div class="item">
            <b>Rostro:</b> Redondo <br>
            <b>Makeup:</b> Contorno <br>
            <b>Recomendado:</b> Ojos definidos
        </div>
    `;
}

loadProfile();

</script>

</body>
</html>
