<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Kahami Academy</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h1>Kahami Academy</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="#" onclick="navigateTo('index.html')">Inicio</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Crear Cuenta</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" minlength="8" required>
                </div>
                <div class="form-group">
                    <label for="first_name">Nombre</label>
                    <input type="text" id="first_name" name="first_name">
                </div>
                <div class="form-group">
                    <label for="last_name">Apellido</label>
                    <input type="text" id="last_name" name="last_name">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
                <p class="form-footer">
                    ¿Ya tienes cuenta? <a href="#" onclick="navigateTo('login.html')">Inicia sesión aquí</a>
                </p>
            </form>
            <div id="signupError" class="error-message"></div>
        </div>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="js/utils/navigation.js"></script>
    <script src="js/pages/signup.js"></script>
</body>
</html>
